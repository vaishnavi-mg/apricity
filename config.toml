baseURL = "https://vaishnavi-mg.github.io/apricity/"
locale = "en-us"
title = "apricity"

[params]
  tagline     = "warmth of the winter sun"
  author      = "Your Name"
  description = "a personal corner of the internet"

  # ─────────────────────────────────────────────────────────────
  # Giscus comments — https://giscus.app
  # Steps:
  #   1. Enable Discussions on your GitHub repo
  #   2. Install the Giscus app: https://github.com/apps/giscus
  #   3. Visit https://giscus.app, pick your repo, copy the values below
  # ─────────────────────────────────────────────────────────────
  giscusRepo        = "vaishnavi-mg/apricity"
  giscusRepoId      = "REPLACE_ME"
  giscusCategory    = "General"
  giscusCategoryId  = "REPLACE_ME"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true        # allows raw HTML inside markdown
  [markup.highlight]
    style     = "dracula"
    noClasses = false

[taxonomies]
  tag  = "tags"
  mood = "moods"

[[menus.main]]
  name   = "Posts"
  url    = "/posts/"
  weight = 1

[[menus.main]]
  name   = "About"
  url    = "/about/"
  weight = 2
