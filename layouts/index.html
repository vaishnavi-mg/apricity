{{ define "main" }}

<section class="hero">
  <div class="hero__inner">
    <p class="hero__greeting">Hello, welcome to</p>
    <h1 class="hero__title">{{ .Site.Title }}</h1>
    <p class="hero__sub">{{ .Site.Params.tagline }}</p>
  </div>
</section>

<section class="posts-section">
  <div class="posts-section__inner">
    <h2 class="section-label">Recent Writings</h2>
    <div class="post-grid">
      {{ range (where .Site.RegularPages "Section" "posts") }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
