<header class="site-header">
  <div class="site-header__inner">

    <a href="/" class="site-logo" aria-label="{{ .Site.Title }} home">
      <span class="site-logo__name">{{ .Site.Title }}</span>
      <span class="site-logo__tag">{{ .Site.Params.tagline }}</span>
    </a>

    <nav class="site-nav" aria-label="main navigation">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}"
         class="nav-link{{ if eq $.RelPermalink (.URL | relURL) }} nav-link--active{{ end }}">
        {{ .Name }}
      </a>
      {{ end }}
    </nav>

  </div>
</header>
