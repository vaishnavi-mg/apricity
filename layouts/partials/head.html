<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />

{{- $title := cond .IsHome (printf "%s — %s" .Site.Title (.Site.Params.tagline | default "")) (printf "%s · %s" .Title .Site.Title) -}}
<title>{{ $title }}</title>

<meta name="description" content="{{ .Description | default .Site.Params.description | default .Site.Title }}" />
<meta property="og:title"       content="{{ $title }}" />
<meta property="og:description" content="{{ .Description | default .Site.Params.description | default "" }}" />
{{ with .Params.cover }}<meta property="og:image" content="{{ . | absURL }}" />{{ end }}
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
